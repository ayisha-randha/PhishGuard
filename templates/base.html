<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PhishGuard - AI-Powered Phishing Detection{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Nunito+Sans:opsz,wght@6..12,300;6..12,400;6..12,500;6..12,600;6..12,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --red:       #D72638;
            --red-dark:  #A81C2A;
            --red-light: #FEF0F1;
            --red-mid:   #F4A4AD;
            --white:     #FFFFFF;
            --off-white: #F8FAFC;
            --gray-100:  #F1F5F9;
            --gray-200:  #E2E8F0;
            --gray-400:  #94A3B8;
            --gray-600:  #475569;
            --dark:      #0F172A;
            --shadow-sm: 0 2px 10px rgba(0,0,0,0.06);
            --shadow-md: 0 8px 28px rgba(0,0,0,0.10);
            --shadow-lg: 0 20px 56px rgba(0,0,0,0.13);
            --radius:    14px;
            --radius-sm: 9px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito Sans', sans-serif;
            background: var(--off-white);
            color: var(--dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── NAVBAR ──────────────────────────────────────────── */
        .navbar {
            background: var(--white);
            border-bottom: 1.5px solid var(--gray-200);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
        }

        .navbar-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 66px;
        }

        .brand {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .brand-name {
            font-family: 'Exo 2', sans-serif;
            font-weight: 900;
            font-size: 1.4rem;
            color: var(--dark);
            letter-spacing: -0.03em;
        }

        .brand-name span { color: var(--red); }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-links a {
            text-decoration: none;
            padding: 10px 18px;
            border-radius: var(--radius-sm);
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--gray-600);
            transition: all 0.2s;
        }

        .nav-links a:hover {
            background: var(--red-light);
            color: var(--red);
        }

        .nav-links a.active {
            background: var(--red);
            color: var(--white);
            font-weight: 600;
        }

        /* ── PAGE WRAPPER ──────────────────────────────────── */
        .page-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 32px 80px;
            flex: 1;
        }

        /* ── PAGE HEADER (inner pages) ─────────────────────── */
        .page-header {
            margin-bottom: 32px;
        }

        .page-header .badge {
            display: inline-block;
            background: var(--red-light);
            color: var(--red);
            font-size: 0.75rem;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 10px;
        }

        .page-header h1 {
            font-family: 'Exo 2', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            color: var(--dark);
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .page-header p {
            color: var(--gray-600);
            font-size: 1rem;
            line-height: 1.6;
        }

        /* ── CARD ──────────────────────────────────────────── */
        .card {
            background: var(--white);
            border-radius: var(--radius);
            border: 1.5px solid var(--gray-200);
            padding: 32px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-sm);
        }

        .card h2 {
            font-family: 'Exo 2', sans-serif;
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--dark);
            margin-bottom: 14px;
        }

        .card h3 {
            font-family: 'Exo 2', sans-serif;
            font-weight: 600;
            font-size: 1.05rem;
            color: var(--dark);
            margin-bottom: 12px;
        }

        .card-accent { border-left: 4px solid var(--red); }

        /* ── FORM ──────────────────────────────────────────── */
        .form-group { margin-bottom: 22px; }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.88rem;
            color: var(--dark);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 13px 16px;
            border: 1.5px solid var(--gray-200);
            border-radius: var(--radius-sm);
            font-size: 0.93rem;
            font-family: 'Nunito Sans', sans-serif;
            color: var(--dark);
            background: var(--white);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--red);
            box-shadow: 0 0 0 3px rgba(215,38,56,0.1);
        }

        .form-group textarea { min-height: 150px; resize: vertical; }

        /* ── BUTTON ────────────────────────────────────────── */
        .btn {
            padding: 13px 32px;
            background: var(--red);
            color: var(--white);
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.93rem;
            font-weight: 600;
            font-family: 'Nunito Sans', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn:hover {
            background: var(--red-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn:active { transform: translateY(0); }

        .btn:disabled {
            background: var(--gray-400);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--red);
            color: var(--red);
        }

        .btn-outline:hover {
            background: var(--red);
            color: var(--white);
        }

        /* ── RESULT ────────────────────────────────────────── */
        .result {
            margin-top: 28px;
            padding: 24px;
            border-radius: var(--radius);
            display: none;
            border: 1.5px solid transparent;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .result.safe {
            background: #EDFAF2;
            border-color: #22C55E;
        }

        .result.phishing {
            background: var(--red-light);
            border-color: var(--red);
        }

        .result.warning {
            background: #FFFBEA;
            border-color: #F59E0B;
        }

        .result h3 {
            margin-bottom: 16px;
            font-family: 'Exo 2', sans-serif;
            font-size: 1.15rem;
        }

        .result-item {
            margin: 8px 0;
            padding: 10px 14px;
            background: rgba(255,255,255,0.7);
            border-radius: var(--radius-sm);
            font-size: 0.88rem;
            display: flex;
            gap: 10px;
        }

        .result-item strong {
            min-width: 200px;
            color: var(--gray-600);
            font-weight: 600;
        }

        /* ── LOADING ───────────────────────────────────────── */
        .loading {
            display: none;
            text-align: center;
            margin: 28px 0;
        }

        .spinner {
            border: 3px solid var(--gray-200);
            border-top: 3px solid var(--red);
            border-radius: 50%;
            width: 38px;
            height: 38px;
            animation: spin 0.75s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading p { color: var(--red); font-weight: 500; font-size: 0.9rem; }

        /* ── ALERT ─────────────────────────────────────────── */
        .alert {
            padding: 14px 18px;
            margin-bottom: 20px;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
        }

        .alert-error {
            background: var(--red-light);
            color: var(--red-dark);
            border: 1px solid var(--red-mid);
        }

        .alert-info {
            background: #EFF6FF;
            color: #1E40AF;
            border: 1px solid #BFDBFE;
        }

        /* ── TIPS LIST ─────────────────────────────────────── */
        .tips-list {
            margin: 14px 0 0 22px;
            color: var(--gray-600);
            line-height: 1.9;
            font-size: 0.91rem;
        }

        /* ── FOOTER ────────────────────────────────────────── */
        footer {
            background: var(--white);
            border-top: 1.5px solid var(--gray-200);
            text-align: center;
            padding: 22px 32px;
            color: var(--gray-400);
            font-size: 0.83rem;
        }

        footer strong { color: var(--red); }

        /* ── RESPONSIVE ────────────────────────────────────── */
        @media (max-width: 768px) {
            .navbar-inner { padding: 0 16px; }
            .page-wrapper { padding: 24px 16px 60px; }
            .nav-links { gap: 2px; }
            .nav-links a { padding: 6px 10px; font-size: 0.8rem; }
        }

        /* ── INNER PAGE SHARED STYLES ──────────────────────── */
        .pg-hero {
            background: var(--white);
            border-bottom: 1.5px solid var(--gray-200);
            padding: 40px 0 32px;
        }

        .pg-hero-inner {
            max-width: 860px;
            margin: 0 auto;
            padding: 0 48px;
            position: relative;
        }

        .pg-hero-inner::after {
            content: '';
            position: absolute;
            top: -80px; right: -60px;
            width: 340px; height: 340px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(215,38,56,0.05) 0%, transparent 65%);
            pointer-events: none;
        }

        .pg-hero .pg-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--red-light);
            border: 1px solid var(--red-mid);
            color: var(--red-dark);
            font-family: 'Exo 2', sans-serif;
            font-size: 0.72rem;
            font-weight: 700;
            padding: 4px 14px;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 18px;
        }

        .pg-hero h1 {
            font-family: 'Exo 2', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            color: var(--dark);
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 12px;
        }

        .pg-hero p {
            color: var(--gray-600);
            font-size: 1rem;
            line-height: 1.7;
            max-width: 560px;
        }

        /* Page body content */
        .pg-body {
            max-width: 1060px;
            margin: 0 auto;
            padding: 56px 48px 100px;
        }

        /* Two-column layout for checker pages */
        .checker-layout {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 36px;
            align-items: start;
        }

        /* Panel card */
        .panel {
            background: var(--white);
            border: 1.5px solid var(--gray-200);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }

        .panel-header {
            padding: 22px 32px;
            border-bottom: 1.5px solid var(--gray-200);
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .panel-header-icon {
            width: 40px; height: 40px;
            background: var(--red-light);
            border-radius: 11px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .panel-header h2 {
            font-family: 'Exo 2', sans-serif;
            font-size: 1.05rem;
            font-weight: 800;
            color: var(--dark);
            letter-spacing: -0.01em;
            margin: 0;
        }

        .panel-body { padding: 32px; }

        /* Input styles */
        .field { margin-bottom: 24px; }

        .field label {
            display: block;
            font-family: 'Exo 2', sans-serif;
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--dark);
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin-bottom: 9px;
        }

        .field input, .field textarea {
            width: 100%;
            padding: 14px 18px;
            border: 1.5px solid var(--gray-200);
            border-radius: 11px;
            font-size: 0.95rem;
            font-family: 'Nunito Sans', sans-serif;
            color: var(--dark);
            background: var(--off-white);
            transition: all 0.2s;
            outline: none;
            line-height: 1.5;
        }

        .field input:focus, .field textarea:focus {
            border-color: var(--red);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(215,38,56,0.08);
        }

        .field textarea { min-height: 240px; resize: vertical; }

        /* File input */
        .file-drop {
            border: 2px dashed var(--gray-200);
            border-radius: 14px;
            padding: 44px 28px;
            text-align: center;
            background: var(--off-white);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .file-drop:hover, .file-drop.drag-over {
            border-color: var(--red);
            background: var(--red-light);
        }

        .file-drop input[type=file] {
            position: absolute; opacity: 0; width: 0; height: 0;
        }

        .file-drop-icon { font-size: 2rem; margin-bottom: 10px; }

        .file-drop p {
            font-family: 'Exo 2', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--gray-600);
        }

        .file-drop .file-name {
            margin-top: 8px;
            font-size: 0.8rem;
            color: var(--red);
            font-weight: 700;
        }

        /* Submit button */
        .btn-analyze {
            width: 100%;
            padding: 14px;
            background: var(--red);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'Exo 2', sans-serif;
            font-size: 0.95rem;
            font-weight: 800;
            cursor: pointer;
            letter-spacing: 0.02em;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-analyze:hover:not(:disabled) {
            background: var(--red-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(215,38,56,0.35);
        }

        .btn-analyze:disabled {
            background: var(--gray-400);
            color: #ffffff;
            cursor: not-allowed;
            transform: none;
        }

        /* Loading */
        .loader {
            display: none;
            align-items: center;
            gap: 12px;
            padding: 16px 0;
        }

        .loader.active { display: flex; }

        .loader-bar {
            flex: 1;
            height: 3px;
            background: var(--gray-200);
            border-radius: 2px;
            overflow: hidden;
        }

        .loader-bar::after {
            content: '';
            display: block;
            height: 100%;
            width: 40%;
            background: var(--red);
            border-radius: 2px;
            animation: loaderSlide 1s ease-in-out infinite;
        }

        @keyframes loaderSlide {
            0%   { transform: translateX(-100%); }
            100% { transform: translateX(350%); }
        }

        .loader span {
            font-family: 'Exo 2', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--red);
            white-space: nowrap;
        }

        /* Result panel */
        .result-panel {
            display: none;
            margin-top: 20px;
            border-radius: 12px;
            border: 1.5px solid transparent;
            overflow: hidden;
            animation: resultIn 0.4s cubic-bezier(.22,.68,0,1.1);
        }

        @keyframes resultIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .result-panel.safe    { border-color: #22C55E; }
        .result-panel.danger  { border-color: var(--red); }
        .result-panel.warning { border-color: #F59E0B; }

        .result-banner {
            padding: 16px 22px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .result-panel.safe    .result-banner { background: #DCFCE7; }
        .result-panel.danger  .result-banner { background: var(--red-light); }
        .result-panel.warning .result-banner { background: #FEF9C3; }

        .result-banner h3 {
            font-family: 'Exo 2', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            color: var(--dark);
            margin: 0;
        }

        .result-rows { background: var(--white); }

        .result-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 13px 24px;
            border-bottom: 1px solid var(--gray-100);
            font-size: 0.88rem;
            gap: 16px;
        }

        .result-row:last-child { border-bottom: none; }

        .result-row .rr-key {
            font-family: 'Exo 2', sans-serif;
            font-weight: 700;
            font-size: 0.76rem;
            color: var(--gray-400);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .result-row .rr-val {
            font-weight: 600;
            color: var(--dark);
            text-align: right;
            max-width: 65%;
            word-break: break-all;
        }

        /* Confidence bar */
        .conf-bar-wrap {
            padding: 16px 24px 22px;
            background: var(--white);
            border-top: 1px solid var(--gray-100);
        }

        .conf-bar-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .conf-bar-label span {
            font-family: 'Exo 2', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--gray-600);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .conf-bar-track {
            height: 7px;
            background: var(--gray-200);
            border-radius: 99px;
            overflow: hidden;
        }

        .conf-bar-fill {
            height: 100%;
            border-radius: 99px;
            background: var(--red);
            width: 0%;
            transition: width 0.9s cubic-bezier(.22,.68,0,1.1);
        }

        .conf-bar-fill.safe-fill    { background: #22C55E; }
        .conf-bar-fill.warning-fill { background: #F59E0B; }

        /* Sidebar tips panel */
        .tips-panel { position: sticky; top: 86px; }

        .tip-item {
            display: flex;
            gap: 14px;
            padding: 15px 0;
            border-bottom: 1px solid var(--gray-100);
        }

        .tip-item:last-child { border-bottom: none; }

        .tip-num {
            width: 26px; height: 26px;
            background: var(--red-light);
            color: var(--red);
            border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Exo 2', sans-serif;
            font-size: 0.7rem;
            font-weight: 900;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .tip-text {
            font-size: 0.87rem;
            color: var(--gray-600);
            line-height: 1.65;
        }

        @media (max-width: 1024px) {
            .pg-hero { padding: 48px 0 42px; }
            .pg-hero-inner { padding: 0 28px; }
            .pg-hero h1 { font-size: 2rem; }
            .pg-body { padding: 40px 28px 72px; }
            .checker-layout { grid-template-columns: 1fr; gap: 24px; }
            .tips-panel { position: static; }
        }

        @media (max-width: 600px) {
            .pg-hero h1 { font-size: 1.7rem; }
            .pg-body { padding: 28px 16px 60px; }
            .panel-body { padding: 22px 20px; }
            .panel-header { padding: 18px 20px; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

    <nav class="navbar">
        <div class="navbar-inner">
            <a href="/" class="brand">
                <span class="brand-name">Phish<span>Guard</span></span>
            </a>
            <div class="nav-links">
                <a href="/"              {% if request.endpoint == 'index'         %}class="active"{% endif %}>Home</a>
                <a href="/url-checker"   {% if request.endpoint == 'url_checker'   %}class="active"{% endif %}>URL</a>
                <a href="/email-checker" {% if request.endpoint == 'email_checker' %}class="active"{% endif %}>Email</a>
                <a href="/sms-checker"   {% if request.endpoint == 'sms_checker'   %}class="active"{% endif %}>SMS</a>
                <a href="/qr-checker"    {% if request.endpoint == 'qr_checker'    %}class="active"{% endif %}>QR Code</a>
                <a href="/graphs"        {% if request.endpoint == 'graphs'         %}class="active"{% endif %}>Graphs</a>
                <a href="/about"         {% if request.endpoint == 'about'          %}class="active"{% endif %}>About</a>
            </div>
        </div>
    </nav>

    {% block full_page %}
    {% block pg_hero %}{% endblock %}
    <div class="pg-body">
        {% block content %}{% endblock %}
    </div>
    {% endblock %}

    <footer>
        <p>&copy; 2026 <strong>PhishGuard</strong> — Powered by CatBoost AI &nbsp;·&nbsp; Keeping you safe online</p>
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>
